name: 🐛 Reportar bug
description: Reportar un error o comportamiento inesperado
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por tomarte el tiempo de reportar el bug. Cuanto más detalle, más rápido lo arreglamos.

  - type: textarea
    id: description
    attributes:
      label: Descripción del bug
      description: Qué está pasando, en qué se diferencia de lo esperado
      placeholder: "Cuando hago X, el sistema responde Y, pero debería responder Z"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a /checkout
        2. Seleccionar "Cripto"
        3. Hacer click en "Obtener dirección"
        4. Ver el error en consola
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Entorno
      options:
        - Local (npm run dev)
        - Docker
        - Producción (Render + Vercel)
        - Otro
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versión del sistema
      placeholder: v3.0.0

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Verificaciones previas
      options:
        - label: Busqué en issues existentes y no encontré uno igual
          required: true
        - label: Estoy en la última versión del repo
          required: true
