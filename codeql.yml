version: 2
updates:
  # Frontend
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "client"]
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"

  # Backend
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "server"]
    groups:
      express:
        patterns:
          - "express"
          - "cors"
          - "multer"
      mongoose:
        patterns:
          - "mongoose"
      ethers:
        patterns:
          - "ethers"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]

  # Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels: ["dependencies", "docker"]
